name: Build MariaDB Multi-Arch

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Aliyun
        uses: docker/login-action@v3
        with:
          registry: crpi-x68pqc6t5zexwzms.cn-guangzhou.personal.cr.aliyuncs.com
          username: ${{ secrets.ALIYUN_USERNAME }}
          password: ${{ secrets.ALIYUN_PASSWORD }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          # 注意：这里指定了不同的 Dockerfile
          file: ./Dockerfile.mariadb
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            crpi-x68pqc6t5zexwzms.cn-guangzhou.personal.cr.aliyuncs.com/xianyuauto/mariadb:10.11
          provenance: false
