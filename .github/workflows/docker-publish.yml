name: Build and Push WHMCS to Aliyun

on:
  workflow_dispatch:
    inputs:
      version_tag:
        description: '镜像版本标签'
        required: true
        type: string
        default: 'v8.13.1'
  # 保持和你成功的案例一致的定时触发
  schedule:
    - cron: '0 3 * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    env:
      # 借鉴成功的 Registry 地址
      ALIYUN_REGISTRY: crpi-x68pqc6t5zexwzms.cn-guangzhou.personal.cr.aliyuncs.com
      # 借鉴成功的命名空间 xianyuauto，但仓库名改为 whmcs（请确保阿里云后台已创建此仓库）
      ALIYUN_IMAGE: crpi-x68pqc6t5zexwzms.cn-guangzhou.personal.cr.aliyuncs.com/xianyuauto/whmcs-docker-app
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Setup QEMU for ARM64
        uses: docker/setup-qemu-action@v3
      
      - name: Login to Aliyun Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ALIYUN_REGISTRY }}
          username: ${{ secrets.ALIYUN_USERNAME }}
          password: ${{ secrets.ALIYUN_PASSWORD }}
      
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.ALIYUN_IMAGE }}:latest
            ${{ env.ALIYUN_IMAGE }}:${{ github.event.inputs.version_tag || 'latest' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # 必须禁用 provenance 以避免阿里云部分环境不兼容多架构清单的问题
          provenance: false

      - name: Success Message
        run: echo "✅ WHMCS 镜像已成功推送到阿里云！"
