name: Build and Push Multi-Arch Image to Aliyun

on:
  push:
    branches: [ "main" ] # 只有推送到 main 分支时触发

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 1. 设置 QEMU (支持多架构仿真构建)
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # 2. 设置 Docker Buildx (支持构建多平台镜像)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3. 登录阿里云镜像仓库
      - name: Login to Aliyun Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ALIYUN_REGISTRY }}
          username: ${{ secrets.ALIVER_DOCKER_USER }}
          password: ${{ secrets.ALIYUN_DOCKER_PASSWORD }}

      # 4. 构建并推送
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          # 同时构建 amd64 和 arm64
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ secrets.ALIYUN_REGISTRY }}/your-namespace/whmcs:latest
            ${{ secrets.ALIYUN_REGISTRY }}/your-namespace/whmcs:v8.13.1
