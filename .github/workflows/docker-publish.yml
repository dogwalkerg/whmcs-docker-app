name: Build and Push Multi-Platform WHMCS

on:
  push:
    branches: [ "main" ]
  # 支持手动触发运行
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 设置 QEMU 以支持 ARM64 编译
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # 设置 Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 登录阿里云 (使用你提供的具体 Registry)
      - name: Login to Aliyun Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ALIYUN_REGISTRY }}
          username: ${{ secrets.ALIVER_DOCKER_USER }}
          password: ${{ secrets.ALIYUN_DOCKER_PASSWORD }}

      # 构建并推送
      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          # 同时构建 x86 和 ARM64 架构
          platforms: linux/amd64,linux/arm64
          push: true
          # 请确保 "whmcs-repo" 是你在阿里云后台创建的镜像仓库名称
          tags: |
            ${{ secrets.ALIYUN_REGISTRY }}/whmcs-repo/whmcs:latest
            ${{ secrets.ALIYUN_REGISTRY }}/whmcs-repo/whmcs:${{ github.sha }}
          # 使用 GitHub 缓存加速构建
          cache-from: type=gha
          cache-to: type=gha,mode=max
