name: Build and Push Multi-Platform WHMCS Image

# 触发条件：当代码推送到 main 分支，或在 main 分支发起 PR 时
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  # 支持手动触发构建
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    steps:
      # 1. 检出代码
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. 设置 QEMU (多架构构建的核心依赖，用于模拟 ARM 环境)
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # 3. 设置 Docker Buildx (Docker 的高级构建工具)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 4. 登录阿里云容器镜像服务
      - name: Login to Aliyun Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ALIYUN_REGISTRY }}
          username: ${{ secrets.ALIVER_DOCKER_USER }}
          password: ${{ secrets.ALIYUN_DOCKER_PASSWORD }}

      # 5. 构建并推送镜像 (支持 AMD64 和 ARM64)
      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          # 同时构建两个平台的镜像
          platforms: linux/amd64,linux/arm64
          push: true
          # 镜像标签设置
          # 注意：请将下面的 "your-namespace" 替换为您阿里云真实的命名空间
          tags: |
            ${{ secrets.ALIYUN_REGISTRY }}/your-namespace/whmcs-app:latest
            ${{ secrets.ALIYUN_REGISTRY }}/your-namespace/whmcs-app:${{ github.sha }}
          # 缓存优化：加速后续构建
          cache-from: type=gha
          cache-to: type=gha,mode=max
