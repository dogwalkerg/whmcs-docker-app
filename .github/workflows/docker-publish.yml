name: Build and Push WHMCS to Aliyun

on:
  workflow_dispatch:
    inputs:
      version_tag:
        description: '镜像版本标签'
        required: true
        type: string
        default: 'v8.13.1'
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    env:
      # 直接使用你截图中的 Registry Secret
      ALIYUN_REGISTRY: ${{ secrets.ALIYUN_REGISTRY }}
      # 这里的路径请确保已经在阿里云后台创建了 xianyuauto 命名空间
      ALIYUN_IMAGE: ${{ secrets.ALIYUN_REGISTRY }}/xianyuauto/whmcs-docker-app
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Setup QEMU for ARM64
        uses: docker/setup-qemu-action@v3
      
      - name: Login to Aliyun Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ALIYUN_REGISTRY }}
          # 修改这里，完全匹配你的截图名称
          username: ${{ secrets.ALIVER_DOCKER_USER }}
          password: ${{ secrets.ALIYUN_DOCKER_PASSWORD }}
      
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.ALIYUN_IMAGE }}:latest
            ${{ env.ALIYUN_IMAGE }}:${{ github.event.inputs.version_tag || 'latest' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      - name: Success Message
        run: echo "✅ WHMCS 镜像已成功推送到 ${{ env.ALIYUN_IMAGE }}"
